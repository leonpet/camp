<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Artilharia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary:#2c3e50; --accent:#3498db; --gold:#f1c40f; --bg:#f4f7f6; --gray:#7f8c8d; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn-voltar { color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 8px 15px; border-radius: 6px; cursor: pointer; background: white; transition: 0.3s; }
        .btn-voltar:hover { background: var(--accent); color: white; }

        .filtro-area { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; max-width: 500px; font-size: 15px; outline: none; }

        /* Tabela principal */
        table.tabela-principal { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table.tabela-principal th { background: #f8f9fa; color: var(--gray); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #dee2e6; text-align: center; }
        table.tabela-principal td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }

        .linha-jogador { cursor: pointer; transition: filter 0.15s; }
        .linha-jogador:hover { filter: brightness(0.96); }

        .pos-col     { font-weight: bold; color: var(--gray); width: 50px; }
        .jogador-col { text-align: left; font-weight: bold; color: var(--primary); }
        .equipe-col  { text-align: left; color: var(--gray); font-size: 13px; }
        .seta-col    { width: 30px; color: var(--accent); font-size: 13px; transition: transform 0.2s; }

        .medalha-1 { background: #fffde7; }
        .medalha-2 { background: #f5f5f5; }
        .medalha-3 { background: #fff3e0; }

        .badge-gols { background: var(--gold); color: var(--primary); padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 15px; }

        /* Sub-menu expansível */
        .linha-detalhe { display: none; }
        .linha-detalhe.aberto { display: table-row; }
        .detalhe-cell { padding: 0 !important; border-bottom: 3px solid var(--accent) !important; }

        .detalhe-inner {
            background: #f0f7ff;
            padding: 16px 24px;
            border-left: 4px solid var(--accent);
        }
        .detalhe-titulo {
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            color: var(--accent); letter-spacing: 1px; margin-bottom: 12px;
        }

        table.tabela-partidas { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.tabela-partidas th {
            background: #dbeeff; color: var(--primary);
            padding: 8px 12px; text-align: left;
            font-size: 11px; text-transform: uppercase;
            border-bottom: 1px solid #c5d9f0;
        }
        table.tabela-partidas td { padding: 9px 12px; border-bottom: 1px solid #dde8f5; }
        table.tabela-partidas tr:last-child td { border-bottom: none; }
        table.tabela-partidas tr:hover td { background: #e5f1ff; }

        .badge-mini { background: var(--gold); color: var(--primary); padding: 2px 9px; border-radius: 10px; font-weight: bold; font-size: 12px; }
        .vs { color: var(--gray); margin: 0 4px; }

        .status-msg { text-align: center; padding: 40px; color: var(--gray); font-style: italic; }

        @media print {
            .btn-voltar, .filtro-area { display: none; }
            .container { box-shadow: none; }
            .linha-detalhe { display: table-row !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">⚽ Artilharia</h2>
        <button class="btn-voltar" onclick="voltarMenu()">Voltar ao Menu</button>
    </div>

    <div class="filtro-area">
        <select id="select_comp" onchange="gerarRelatorio()">
            <option value="">Carregando competições...</option>
        </select>
    </div>

    <div id="conteudo">
        <div class="status-msg">Selecione uma competição para ver a artilharia.</div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://jumfigqlnqplbpokqhvj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sessaoAtual = null;
let golsRaw     = [];   // todos os gols carregados, reutilizados no detalhe

function voltarMenu() {
    if (sessaoAtual) {
        window.location.href = `menu.html#access_token=${sessaoAtual.access_token}&refresh_token=${sessaoAtual.refresh_token}`;
    } else {
        window.location.href = "index.html";
    }
}

async function verificarAcesso() {
    const hash   = window.location.hash.replace(/^#/, '');
    const params = new URLSearchParams(hash);
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken && refreshToken) {
        const { data, error } = await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        window.history.replaceState(null, '', window.location.pathname);
        if (error || !data.session) { window.location.href = "index.html"; return; }
        sessaoAtual = data.session;
    } else {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = "index.html"; return; }
        sessaoAtual = session;
    }

    inicializar();
}

async function inicializar() {
    const { data } = await supabaseClient
        .from('campeonato_competicao')
        .select('id_competicao, competicao')
        .order('competicao');

    const sel = document.getElementById('select_comp');
    if (data) {
        sel.innerHTML = '<option value="">-- Selecione a Competição --</option>';
        data.forEach(c => sel.innerHTML += `<option value="${c.id_competicao}">${c.competicao}</option>`);
    }
}

async function gerarRelatorio() {
    const compId   = document.getElementById('select_comp').value;
    const conteudo = document.getElementById('conteudo');
    if (!compId) return;

    golsRaw = [];
    conteudo.innerHTML = '<div class="status-msg">Calculando artilharia...</div>';

    // Busca gols com tudo necessário para o ranking e para o detalhe
    const { data: gols, error } = await supabaseClient
        .from('campeonato_gol')
        .select(`
            gol_marcado,
            campeonato_jogador(id_jogador, nome_jogador),
            campeonato_partida!inner(
                id_partida, id_competicao, grupo,
                equipe_a:campeonato_equipe!campeonato_partida_id_equipe_a_fkey(nome_equipe),
                equipe_b:campeonato_equipe!campeonato_partida_id_equipe_b_fkey(nome_equipe),
                campeonato_competicao(competicao)
            )
        `)
        .eq('campeonato_partida.id_competicao', compId);

    if (error) { conteudo.innerHTML = `<div class="status-msg">Erro: ${error.message}</div>`; return; }
    if (!gols || gols.length === 0) { conteudo.innerHTML = '<div class="status-msg">Nenhum gol registrado nesta competição.</div>'; return; }

    golsRaw = gols;

    // Agrupa total de gols por jogador
    const mapa = {};
    gols.forEach(g => {
        const jogador = g.campeonato_jogador;
        if (!jogador) return;
        const id = jogador.id_jogador;
        if (!mapa[id]) {
            mapa[id] = { id, nome: jogador.nome_jogador, total: 0, equipe: '-' };
        }
        mapa[id].total += g.gol_marcado || 0;
    });

    // Busca equipe atual (último vínculo por data_entrada)
    const ids = Object.keys(mapa);
    if (ids.length > 0) {
        const { data: vinculos } = await supabaseClient
            .from('campeonato_vinculo')
            .select('numero_jogador, data_entrada, campeonato_equipe(nome_equipe)')
            .in('numero_jogador', ids)
            .order('data_entrada', { ascending: false });

        if (vinculos) {
            const vistos = new Set();
            vinculos.forEach(v => {
                if (!vistos.has(v.numero_jogador)) {
                    vistos.add(v.numero_jogador);
                    if (mapa[v.numero_jogador]) {
                        mapa[v.numero_jogador].equipe = v.campeonato_equipe?.nome_equipe || '-';
                    }
                }
            });
        }
    }

    const lista    = Object.values(mapa).sort((a, b) => b.total - a.total);
    const medalhas = ['🥇', '🥈', '🥉'];
    const classes  = ['medalha-1', 'medalha-2', 'medalha-3'];

    let linhas = '';
    lista.forEach((j, idx) => {
        const classe = classes[idx] || '';
        linhas += `
            <tr class="linha-jogador ${classe}" onclick="toggleDetalhe(${j.id})">
                <td class="pos-col">${medalhas[idx] || (idx + 1) + 'º'}</td>
                <td class="jogador-col">${j.nome}</td>
                <td class="equipe-col">${j.equipe}</td>
                <td><span class="badge-gols">${j.total}</span></td>
                <td class="seta-col" id="seta-${j.id}">▼</td>
            </tr>
            <tr class="linha-detalhe" id="detalhe-${j.id}">
                <td class="detalhe-cell" colspan="5">
                    <div class="detalhe-inner" id="inner-${j.id}"></div>
                </td>
            </tr>
        `;
    });

    conteudo.innerHTML = `
        <table class="tabela-principal">
            <thead>
                <tr>
                    <th class="pos-col">Pos.</th>
                    <th style="text-align:left;">Jogador</th>
                    <th style="text-align:left;">Equipe Atual</th>
                    <th>Gols</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>${linhas}</tbody>
        </table>
    `;
}

function toggleDetalhe(jogadorId) {
    const linhaDetalhe = document.getElementById(`detalhe-${jogadorId}`);
    const seta         = document.getElementById(`seta-${jogadorId}`);
    const inner        = document.getElementById(`inner-${jogadorId}`);
    const estaAberto   = linhaDetalhe.classList.contains('aberto');

    // Fecha todos
    document.querySelectorAll('.linha-detalhe.aberto').forEach(el => el.classList.remove('aberto'));
    document.querySelectorAll('.seta-col').forEach(el => el.textContent = '▼');

    if (!estaAberto) {
        linhaDetalhe.classList.add('aberto');
        seta.textContent = '▲';
        preencherDetalhe(jogadorId, inner);
    }
}

function preencherDetalhe(jogadorId, inner) {
    const golsJogador = golsRaw.filter(g => g.campeonato_jogador?.id_jogador === jogadorId);

    if (!golsJogador.length) {
        inner.innerHTML = '<p style="color:var(--gray);font-size:13px;margin:0;">Nenhuma partida encontrada.</p>';
        return;
    }

    // Agrupa gols por partida
    const porPartida = {};
    golsJogador.forEach(g => {
        const p = g.campeonato_partida;
        if (!p) return;
        const pid = p.id_partida;
        if (!porPartida[pid]) {
            porPartida[pid] = {
                id:         pid,
                competicao: p.campeonato_competicao?.competicao || '-',
                grupo:      p.grupo || '-',
                equipe_a:   p.equipe_a?.nome_equipe || '?',
                equipe_b:   p.equipe_b?.nome_equipe || '?',
                gols:       0
            };
        }
        porPartida[pid].gols += g.gol_marcado || 0;
    });

    const partidas = Object.values(porPartida).sort((a, b) => a.id - b.id);

    const linhas = partidas.map(p => `
        <tr>
            <td>${p.competicao}</td>
            <td style="text-align:center; font-weight:bold;">Grupo ${p.grupo}</td>
            <td>${p.equipe_a} <span class="vs">×</span> ${p.equipe_b}</td>
            <td style="text-align:center;"><span class="badge-mini">${p.gols} gol${p.gols !== 1 ? 's' : ''}</span></td>
        </tr>
    `).join('');

    inner.innerHTML = `
        <div class="detalhe-titulo">⚽ Partidas com gols marcados</div>
        <table class="tabela-partidas">
            <thead>
                <tr>
                    <th>Competição</th>
                    <th style="text-align:center;">Grupo</th>
                    <th>Partida</th>
                    <th style="text-align:center;">Gols</th>
                </tr>
            </thead>
            <tbody>${linhas}</tbody>
        </table>
    `;
}

verificarAcesso();
</script>
</body>
</html>
