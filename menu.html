<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; display: none; /* Escondido por padrão */ }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section-title { font-size: 13px; font-weight: bold; color: #95a5a6; text-transform: uppercase; margin: 30px 0 15px 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; background: white; color: var(--dark); text-decoration: none; border-radius: 15px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.03); height: 120px; border-bottom: 4px solid var(--primary); }
        .btn-logout { background: white; color: var(--danger); border: 1px solid var(--danger); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:#f4f7f6; display:flex; justify-content:center; align-items:center; z-index:9999; font-weight:bold; }
    </style>
</head>
<body>

<div id="loading">Verificando sessão ativa...</div>

<div class="container" id="conteudo">
    <div class="header">
        <h2>⚙️ Painel Admin</h2>
        <button class="btn-logout" onclick="sair()">Sair</button>
    </div>

    <div class="section-title">Navegação</div>
    <div class="grid">
        <a href="competicao.html" class="card">🏆 Competições</a>
        <a href="equipes.html" class="card">🛡️ Equipes</a>
        <a href="inscricao.html" class="card">📝 Inscrições</a>
        <a href="partidas.html" class="card">🏟️ Partidas</a>
        <a href="rel_proxima_fase.html" class="card" style="background: var(--dark); color:white;">📊 Relatório Qualificação</a>
    </div>
</div>

<script>
const SUPABASE_URL = "https://jumfigqlnqplbpokqhvj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    storageKey: 'torneio-admin-session'
  }
});

async function validarAcesso() {
    // 1. Tenta pegar a sessão
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (session) {
        liberarPainel();
    } else {
        // 2. Retry: Espera um pouco (útil para o Vercel) e tenta de novo
        console.log("Sessão não detectada, tentando novamente em 1.5s...");
        await new Promise(r => setTimeout(r, 1500));
        const { data: { session: retrySession } } = await supabaseClient.auth.getSession();
        
        if (retrySession) {
            liberarPainel();
        } else {
            // 3. Falhou mesmo: Volta para o login
            window.location.replace("login.html");
        }
    }
}

function liberarPainel() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';
}

async function sair() {
    await supabaseClient.auth.signOut();
    window.location.replace("login.html");
}

validarAcesso();
</script>
</body>
</html>
