<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Classificação</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn-voltar { color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 8px 15px; border-radius: 6px; cursor: pointer; background: white; transition: 0.3s; }
        .btn-voltar:hover { background: var(--accent); color: white; }
        .filtro-area { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; max-width: 500px; font-size: 16px; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .time-nome { text-align: left; font-weight: bold; color: var(--primary); }
        .destaque { background: #e8f4fd; font-weight: bold; color: var(--accent); }
        .posicao-col { font-weight: bold; color: #7f8c8d; width: 60px; }
        .ranking-fixo { color: #e67e22; font-weight: bold; background: #fffcf0; }
        .status-msg { text-align: center; padding: 20px; color: #7f8c8d; }
        @media print { .btn-voltar, .filtro-area { display: none; } .container { box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📊 Classificação por Competição</h2>
        <button class="btn-voltar" onclick="voltarMenu()">Voltar ao Menu</button>
    </div>

    <div class="filtro-area">
        <select id="select_comp" onchange="gerarRelatorio()">
            <option value="">Carregando competições...</option>
        </select>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th class="time-nome">Equipe</th>
                    <th>Grupo</th>
                    <th>Jogou</th>
                    <th>Venceu</th>
                    <th>Empatou</th>
                    <th>Perdeu</th>
                    <th>Gol Pró</th>
                    <th>Gol Contra</th>
                    <th>Saldo</th>
                    <th>Pontos</th>
                    <th>Ranking</th>
                </tr>
            </thead>
            <tbody id="tabela-body">
                <tr><td colspan="12" class="status-msg">Selecione uma competição acima.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const SUPABASE_URL = "https://jumfigqlnqplbpokqhvj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sessaoAtual = null;

function voltarMenu() {
    if (sessaoAtual) {
        window.location.href = `menu.html#access_token=${sessaoAtual.access_token}&refresh_token=${sessaoAtual.refresh_token}`;
    } else {
        window.location.href = "index.html";
    }
}

async function verificarAcesso() {
    const hash   = window.location.hash.replace(/^#/, '');
    const params = new URLSearchParams(hash);
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    if (accessToken && refreshToken) {
        const { data, error } = await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        window.history.replaceState(null, '', window.location.pathname);
        if (error || !data.session) { window.location.href = "index.html"; return; }
        sessaoAtual = data.session;
    } else {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = "index.html"; return; }
        sessaoAtual = session;
    }

    inicializar();
}

async function inicializar() {
    const sel = document.getElementById('select_comp');
    const { data } = await supabaseClient.from('campeonato_competicao').select('id_competicao, competicao').order('competicao');
    if (data) {
        sel.innerHTML = '<option value="">-- Selecione a Competição --</option>';
        data.forEach(c => sel.innerHTML += `<option value="${c.id_competicao}">${c.competicao}</option>`);
    }
}

async function gerarRelatorio() {
    const compId = document.getElementById('select_comp').value;
    const tbody  = document.getElementById('tabela-body');
    if (!compId) return;

    tbody.innerHTML = '<tr><td colspan="12" class="status-msg">Processando dados...</td></tr>';

    const { data: inscritos } = await supabaseClient
        .from('campeonato_inscricao')
        .select('id_equipe, grupo, campeonato_equipe(nome_equipe, ranking_atual)')
        .eq('id_competicao', compId);

    const { data: partidas } = await supabaseClient
        .from('campeonato_partida')
        .select('*')
        .eq('id_competicao', compId)
        .eq('status', 'Finalizado');

    if (inscritos) calcular(inscritos, partidas || []);
}

function calcular(inscritos, partidas) {
    let dados = {};

    inscritos.forEach(i => {
        dados[i.id_equipe] = {
            nome: i.campeonato_equipe.nome_equipe,
            grupo: i.grupo || '-',
            ranking_db: i.campeonato_equipe.ranking_atual || 0,
            j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, pts: 0
        };
    });

    partidas.forEach(p => {
        const tA = p.id_equipe_a; const tB = p.id_equipe_b;
        if (dados[tA] && dados[tB]) {
            dados[tA].j++; dados[tB].j++;
            dados[tA].gp += p.gols_a; dados[tA].gc += p.gols_b;
            dados[tB].gp += p.gols_b; dados[tB].gc += p.gols_a;
            if (p.gols_a > p.gols_b)      { dados[tA].pts += 3; dados[tA].v++; dados[tB].d++; }
            else if (p.gols_a < p.gols_b) { dados[tB].pts += 3; dados[tB].v++; dados[tA].d++; }
            else                           { dados[tA].pts += 1; dados[tB].pts += 1; dados[tA].e++; dados[tB].e++; }
        }
    });

    let lista = Object.values(dados).map(t => ({ ...t, sg: t.gp - t.gc }));

    lista.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.v   !== a.v)   return b.v   - a.v;
        if (b.gp  !== a.gp)  return b.gp  - a.gp;
        if (b.sg  !== a.sg)  return b.sg  - a.sg;
        return a.ranking_db - b.ranking_db;
    });

    const tbody = document.getElementById('tabela-body');
    tbody.innerHTML = lista.map((t, idx) => `
        <tr>
            <td class="posicao-col">${idx + 1}º</td>
            <td class="time-nome">${t.nome}</td>
            <td>${t.grupo}</td>
            <td>${t.j}</td>
            <td>${t.v}</td>
            <td>${t.e}</td>
            <td>${t.d}</td>
            <td>${t.gp}</td>
            <td>${t.gc}</td>
            <td>${t.sg}</td>
            <td class="destaque">${t.pts}</td>
            <td class="ranking-fixo">${t.ranking_db}</td>
        </tr>
    `).join('');
}

verificarAcesso();
</script>
</body>
</html>
