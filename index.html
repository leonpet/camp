<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        #dashboardBtn, #logoutBtn {
            width: 100%;
            margin-top: 10px;
        }
        #logoutBtn {
            background-color: #f44343;
        }
        .dashboard-card {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .nav-buttons button {
            flex: 1;
        }
    </style>
</head>
<body>
    <h1>Sistema de Login</h1>
    
    <!-- PÁGINA DE LOGIN -->
    <div id="loginPage" class="page active">
        <h2>Login / Cadastro</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" autocomplete="username" required />
            <input type="password" id="password" placeholder="Senha" autocomplete="current-password" required />
            <div class="nav-buttons">
                <button type="submit">Login</button>
                <button type="button" onclick="fazerCadastro()">Cadastro</button>
            </div>
            <button type="button" onclick="mostrarRecuperar()" style="background-color: #ff9800; width: 100%;">Esqueci minha senha</button>
        </form>
    </div>

    <!-- PÁGINA DE RECUPERAÇÃO DE SENHA -->
    <div id="recoverPage" class="page">
        <h2>Recuperar Senha</h2>
        <form id="recoverForm">
            <input type="email" id="resetEmail" placeholder="Seu e-mail" required />
            <button type="submit">Enviar instruções</button>
            <button type="button" onclick="mostrarLogin()">Voltar</button>
        </form>
    </div>

    <!-- PÁGINA DO DASHBOARD -->
    <div id="dashboardPage" class="page">
        <h2>Dashboard</h2>
        <div class="dashboard-card" id="userInfo">
            <h3>Informações do Usuário</h3>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>ID:</strong> <span id="userId"></span></p>
            <p><strong>Status:</strong> Logado com sucesso!</p>
        </div>
        <button onclick="fazerLogout()" id="logoutBtn">Sair da conta</button>
    </div>
    
    <!-- Mensagens -->
    <div id="message" class="message"></div>

    <script>
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Navegação entre páginas
        function mostrarLogin() {
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('recoverPage').classList.remove('active');
            document.getElementById('dashboardPage').classList.remove('active');
        }

        function mostrarRecuperar() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('recoverPage').classList.add('active');
            document.getElementById('dashboardPage').classList.remove('active');
        }

        function mostrarDashboard() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('recoverPage').classList.remove('active');
            document.getElementById('dashboardPage').classList.add('active');
        }

        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = `message ${tipo}`;
            setTimeout(() => {
                msgDiv.textContent = '';
                msgDiv.className = 'message';
            }, 3000);
        }

        // LOGIN
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email, password
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Login realizado!', 'success');
                document.getElementById('userEmail').textContent = data.user.email;
                document.getElementById('userId').textContent = data.user.id;
                mostrarDashboard();
            }
        }

        // CADASTRO
        async function fazerCadastro() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (password.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            const { error } = await supabaseClient.auth.signUp({
                email, password
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Cadastro realizado! Verifique seu e-mail.', 'success');
            }
        }

        // RECUPERAR SENHA
        async function resetPassword() {
            const email = document.getElementById('resetEmail').value;
            
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.href
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('E-mail de recuperação enviado!', 'success');
                setTimeout(mostrarLogin, 2000);
            }
        }

        // LOGOUT
        async function fazerLogout() {
            await supabaseClient.auth.signOut();
            mostrarMensagem('Logout realizado!', 'success');
            mostrarLogin();
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // Verificar usuário ao carregar
        async function verificarUsuario() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userId').textContent = user.id;
                mostrarDashboard();
            }
        }

        // Event listeners
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            fazerLogin();
        });

        document.getElementById('recoverForm').addEventListener('submit', (e) => {
            e.preventDefault();
            resetPassword();
        });

        // Iniciar
        verificarUsuario();
    </script>
</body>
</html>
