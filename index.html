<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Supabase - Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #logoutBtn {
            background-color: #f44343;
        }
        #logoutBtn:hover {
            background-color: #d32f2f;
        }
        #forgotPasswordBtn {
            background-color: #ff9800;
        }
        #forgotPasswordBtn:hover {
            background-color: #f57c00;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #userInfo {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
            text-align: left;
            display: none;
        }
        #loginForm {
            display: block;
        }
        #forgotPasswordForm {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .link-button {
            background: none;
            border: none;
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 0;
        }
        .link-button:hover {
            color: #004499;
            background: none;
        }
    </style>
</head>
<body>
    <h2>Login / Cadastro</h2>
    
    <!-- Formulário de Login (mostra quando deslogado) -->
    <div id="loginForm">
        <input type="email" id="email" placeholder="E-mail" /><br>
        <input type="password" id="password" placeholder="Senha" /><br>
        <button onclick="login()">Login</button>
        <button onclick="signUp()">Cadastro</button>
        <br>
        <button class="link-button" onclick="showForgotPassword()">Esqueci minha senha</button>
    </div>

    <!-- Formulário de Recuperação de Senha -->
    <div id="forgotPasswordForm">
        <h3>Recuperar Senha</h3>
        <p>Digite seu e-mail para receber instruções de recuperação:</p>
        <input type="email" id="resetEmail" placeholder="Seu e-mail" /><br>
        <button onclick="resetPassword()" style="background-color: #ff9800;">Enviar instruções</button>
        <br>
        <button class="link-button" onclick="showLogin()">Voltar ao login</button>
    </div>

    <!-- Informações do usuário (mostra quando logado) -->
    <div id="userInfo">
        <h3>Usuário Logado</h3>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>ID:</strong> <span id="userId"></span></p>
        <p><strong>Último acesso:</strong> <span id="lastAccess"></span></p>
        <button id="logoutBtn" onclick="logout()">Sair</button>
    </div>
    
    <!-- Div para mostrar mensagens -->
    <div id="message" class="message"></div>

    <script>
        // Configuração do Supabase
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';
        
        // Criar cliente Supabase
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Funções para alternar entre formulários
        function showForgotPassword() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('forgotPasswordForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        }

        // Função para mostrar mensagens
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 5000);
        }

        // Função para atualizar a interface baseado no estado do usuário
        function updateUI(user) {
            const loginForm = document.getElementById('loginForm');
            const forgotForm = document.getElementById('forgotPasswordForm');
            const userInfo = document.getElementById('userInfo');
            
            if (user) {
                loginForm.style.display = 'none';
                forgotForm.style.display = 'none';
                userInfo.style.display = 'block';
                
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userId').textContent = user.id;
                document.getElementById('lastAccess').textContent = new Date().toLocaleString();
            } else {
                showLogin();
            }
        }

        // Salvar dados do usuário no localStorage
        function saveUserToStorage(user) {
            if (user) {
                const userData = {
                    email: user.email,
                    id: user.id,
                    lastLogin: new Date().toISOString()
                };
                localStorage.setItem('supabase_user', JSON.stringify(userData));
            } else {
                localStorage.removeItem('supabase_user');
            }
        }

        // FUNÇÃO DE RECUPERAÇÃO DE SENHA - CORRIGIDA
        async function resetPassword() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                showMessage('Digite seu e-mail!', 'error');
                return;
            }
            
            // CORREÇÃO: Usar a URL base correta (seu domínio na Vercel)
            const baseUrl = window.location.origin; // Isso pega https://camp-topaz.vercel.app
            const redirectTo = baseUrl + '/reset-password.html';
            
            console.log('Enviando email para:', email);
            console.log('Redirect para:', redirectTo);
            
            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: redirectTo
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
                console.error('Erro detalhado:', error);
            } else {
                showMessage('E-mail de recuperação enviado! Verifique sua caixa de entrada.', 'success');
                console.log('Email enviado com sucesso para:', email);
                
                setTimeout(() => {
                    document.getElementById('resetEmail').value = '';
                    showLogin();
                }, 3000);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
            } else {
                showMessage('Login realizado com sucesso!', 'success');
                saveUserToStorage(data.user);
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
            } else {
                showMessage('Cadastro realizado! Verifique seu e-mail.', 'success');
                console.log('Usuário criado:', data.user);
            }
        }

        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            
            if (error) {
                showMessage('Erro ao sair: ' + error.message, 'error');
            } else {
                showMessage('Logout realizado com sucesso!', 'success');
                saveUserToStorage(null);
                updateUI(null);
                
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            }
        }

        // Verificar se já está logado ao carregar a página
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                showMessage(`Bem-vindo, ${user.email}!`, 'success');
                updateUI(user);
                saveUserToStorage(user);
            } else {
                showLogin();
            }
        }

        // Monitorar mudanças na autenticação
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Evento de auth:', event);
            if (event === 'SIGNED_IN') {
                saveUserToStorage(session?.user);
                updateUI(session?.user);
            } else if (event === 'SIGNED_OUT') {
                saveUserToStorage(null);
                updateUI(null);
            }
        });

        // Verificar usuário ao carregar a página
        checkUser();
    </script>
</body>
</html>
