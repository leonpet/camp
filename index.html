<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            min-height: 100vh; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px;
        }
        
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #333; 
            font-size: 28px;
            font-weight: 600;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo span {
            font-size: 50px;
        }
        
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus { 
            border-color: #667eea; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .msg { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            min-height: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        
        .msg.error {
            background: #fee;
            color: #c33;
        }
        
        .msg.success {
            background: #efe;
            color: #3c3;
        }
        
        .msg.info {
            background: #eef;
            color: #33c;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span>⚽</span>
        </div>
        <h2>CAMPEONATOsupabase</h2>
        
        <form id="loginForm">
            <input 
                type="email" 
                id="email" 
                placeholder="E-mail" 
                required 
                autocomplete="username"
            >
            <input 
                type="password" 
                id="senha" 
                placeholder="Senha" 
                required 
                autocomplete="current-password"
            >
            <button type="submit" id="btnLogin">Entrar no Painel</button>
        </form>
        
        <div class="msg" id="msg"></div>
        <div class="footer">Área restrita - Apenas administradores</div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://jumfigqlnqplbpokqhvj.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE'

        // Criar cliente Supabase com configuração de sessão
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: true,
                storageKey: 'admin-session',
                storage: window.localStorage,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        })

        // Elementos do DOM
        const form = document.getElementById('loginForm')
        const email = document.getElementById('email')
        const senha = document.getElementById('senha')
        const msg = document.getElementById('msg')
        const btn = document.getElementById('btnLogin')

        // Função para mostrar mensagem
        function mostrarMsg(texto, tipo) {
            msg.textContent = texto
            msg.className = 'msg ' + tipo
        }

        // Verificar se já está logado ao carregar a página
        async function verificarSessao() {
            try {
                const { data: { session } } = await supabase.auth.getSession()
                
                if (session) {
                    console.log('Sessão encontrada, redirecionando...')
                    window.location.href = '/dashboard.html'
                }
            } catch (error) {
                console.error('Erro ao verificar sessão:', error)
            }
        }

        // Executar verificação quando a página carregar
        verificarSessao()

        // Evento de submit do formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault()
            
            // Validar campos
            if (!email.value || !senha.value) {
                mostrarMsg('Preencha todos os campos', 'error')
                return
            }

            // Desabilitar botão
            btn.disabled = true
            btn.textContent = 'Entrando...'
            mostrarMsg('Autenticando...', 'info')

            try {
                // Tentar fazer login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email.value,
                    password: senha.value
                })

                if (error) {
                    console.error('Erro no login:', error)
                    
                    // Mensagens amigáveis para erros comuns
                    if (error.message.includes('Invalid login credentials')) {
                        mostrarMsg('E-mail ou senha incorretos', 'error')
                    } else if (error.message.includes('Email not confirmed')) {
                        mostrarMsg('E-mail não confirmado', 'error')
                    } else {
                        mostrarMsg('Erro: ' + error.message, 'error')
                    }
                    
                    btn.disabled = false
                    btn.textContent = 'Entrar no Painel'
                    return
                }

                if (data.session) {
                    console.log('Login bem-sucedido!')
                    mostrarMsg('Login realizado! Redirecionando...', 'success')
                    
                    // Pequeno delay para mostrar a mensagem de sucesso
                    setTimeout(() => {
                        window.location.href = '/dashboard.html'
                    }, 1000)
                }

            } catch (err) {
                console.error('Erro inesperado:', err)
                mostrarMsg('Erro de conexão. Tente novamente.', 'error')
                btn.disabled = false
                btn.textContent = 'Entrar no Painel'
            }
        })

        // Adicionar efeito de loading nos inputs
        email.addEventListener('input', () => {
            if (msg.classList.contains('error')) {
                msg.textContent = ''
                msg.className = 'msg'
            }
        })

        senha.addEventListener('input', () => {
            if (msg.classList.contains('error')) {
                msg.textContent = ''
                msg.className = 'msg'
            }
        })
    </script>
</body>
</html>
