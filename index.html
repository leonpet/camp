<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #logoutBtn {
            background-color: #f44343;
        }
        #logoutBtn:hover {
            background-color: #d32f2f;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #userInfo {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
            text-align: left;
            display: none;
        }
        #loginForm {
            display: block;
        }
        #forgotPasswordForm {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .link-button {
            background: none;
            border: none;
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 0;
        }
        .link-button:hover {
            color: #004499;
            background: none;
        }
        #dashboardLink {
            display: none;
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h2>Login / Cadastro</h2>
        
        <!-- Formulário de Login -->
        <div id="loginForm">
            <input type="email" id="email" placeholder="E-mail" /><br>
            <input type="password" id="password" placeholder="Senha" /><br>
            <button onclick="login()">Login</button>
            <button onclick="signUp()">Cadastro</button>
            <br>
            <button class="link-button" onclick="showForgotPassword()">Esqueci minha senha</button>
        </div>

        <!-- Formulário de Recuperação -->
        <div id="forgotPasswordForm">
            <h3>Recuperar Senha</h3>
            <p>Digite seu e-mail para receber instruções:</p>
            <input type="email" id="resetEmail" placeholder="Seu e-mail" /><br>
            <button onclick="resetPassword()" style="background-color: #ff9800;">Enviar instruções</button>
            <br>
            <button class="link-button" onclick="showLogin()">Voltar ao login</button>
        </div>

        <!-- Informações do usuário -->
        <div id="userInfo">
            <h3>Usuário Logado</h3>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>ID:</strong> <span id="userId"></span></p>
            <p><strong>Status:</strong> <span id="userStatus">Ativo</span></p>
            <button onclick="goToDashboard()" style="background-color: #2196F3;">Ir para Dashboard</button>
            <button id="logoutBtn" onclick="logout()">Sair</button>
        </div>
        
        <!-- Mensagens -->
        <div id="message" class="message"></div>
    </div>

    <script>
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Verificar se estamos na página correta baseado na URL
        function checkCurrentPage() {
            const path = window.location.pathname;
            console.log('Página atual:', path);
            
            // Se estiver tentando acessar dashboard diretamente
            if (path.includes('dashboard') || path === '/dashboard' || path === '/dashboard.html') {
                checkDashboardAccess();
            }
        }

        // Verificar acesso ao dashboard
        async function checkDashboardAccess() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                // Se não estiver logado, redireciona para index
                window.location.href = '/';
            } else {
                // Se estiver logado, mostra o dashboard
                showDashboard();
            }
        }

        // Mostrar dashboard
        function showDashboard() {
            document.body.innerHTML = `
                <div style="max-width:600px; margin:50px auto; padding:20px; text-align:center;">
                    <h1>Dashboard</h1>
                    <div id="userInfo" style="background:#e3f2fd; padding:20px; border-radius:4px; margin:20px 0; text-align:left;">
                        <h3>Carregando informações...</h3>
                    </div>
                    <button onclick="logout()" style="background:#f44343; color:white; padding:12px 20px; border:none; border-radius:4px; cursor:pointer;">Sair da conta</button>
                </div>
            `;
            
            loadDashboardData();
        }

        // Carregar dados do dashboard
        async function loadDashboardData() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            const userInfo = document.getElementById('userInfo');
            if (user) {
                userInfo.innerHTML = `
                    <h3>Informações do Usuário</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>ID:</strong> ${user.id}</p>
                    <p><strong>Último acesso:</strong> ${new Date().toLocaleString()}</p>
                `;
            }
        }

        // Funções de UI
        function showForgotPassword() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('forgotPasswordForm').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('forgotPasswordForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 5000);
        }

        function updateUI(user) {
            const loginForm = document.getElementById('loginForm');
            const forgotForm = document.getElementById('forgotPasswordForm');
            const userInfo = document.getElementById('userInfo');
            
            if (user) {
                loginForm.style.display = 'none';
                forgotForm.style.display = 'none';
                userInfo.style.display = 'block';
                
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userId').textContent = user.id;
                saveUserToStorage(user);
            } else {
                showLogin();
            }
        }

        function saveUserToStorage(user) {
            if (user) {
                localStorage.setItem('supabase_user', JSON.stringify({
                    email: user.email,
                    id: user.id,
                    lastLogin: new Date().toISOString()
                }));
            } else {
                localStorage.removeItem('supabase_user');
            }
        }

        // Funções de autenticação
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email, password
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
            } else {
                showMessage('Login realizado!', 'success');
                saveUserToStorage(data.user);
                updateUI(data.user);
            }
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('Preencha todos os campos!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signUp({
                email, password
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
            } else {
                showMessage('Cadastro realizado! Verifique seu e-mail.', 'success');
            }
        }

        async function resetPassword() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                showMessage('Digite seu e-mail!', 'error');
                return;
            }
            
            const baseUrl = window.location.origin;
            const redirectTo = baseUrl + '/reset-password.html';
            
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: redirectTo
            });
            
            if (error) {
                showMessage('Erro: ' + error.message, 'error');
            } else {
                showMessage('E-mail de recuperação enviado!', 'success');
                setTimeout(() => {
                    document.getElementById('resetEmail').value = '';
                    showLogin();
                }, 3000);
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            saveUserToStorage(null);
            window.location.href = '/';
        }

        function goToDashboard() {
            window.location.href = '/dashboard';
        }

        // Inicialização
        async function init() {
            // Verificar se é página de dashboard
            if (window.location.pathname.includes('dashboard')) {
                await checkDashboardAccess();
            } else {
                // Página normal de login
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    updateUI(user);
                }
            }
        }

        // Iniciar
        init();
    </script>
</body>
</html>
