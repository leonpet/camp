<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 45%;
        }
        button:hover {
            background-color: #45a049;
        }
        #logoutBtn {
            background-color: #f44343;
            width: 100%;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        #userInfo {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
            text-align: left;
        }
        #dashboardBtn {
            background-color: #2196F3;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Sistema de Login</h2>
    
    <!-- Área de login (só aparece quando deslogado) -->
    <div id="loginArea">
        <input type="email" id="email" placeholder="E-mail" /><br>
        <input type="password" id="password" placeholder="Senha" /><br>
        <button onclick="fazerLogin()">Login</button>
        <button onclick="fazerCadastro()">Cadastro</button>
    </div>

    <!-- Área do usuário (só aparece quando logado) -->
    <div id="userArea" style="display: none;">
        <h3>Você está logado!</h3>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>ID:</strong> <span id="userId"></span></p>
        <button id="dashboardBtn" onclick="irParaDashboard()">Ir para Dashboard</button>
        <button id="logoutBtn" onclick="fazerLogout()">Sair</button>
    </div>
    
    <!-- Mensagens -->
    <div id="message" class="message"></div>

    <script>
        // Configuração do Supabase
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';
        
        // Criar cliente Supabase
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Mostrar mensagem
        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = `message ${tipo}`;
            setTimeout(() => {
                msgDiv.textContent = '';
                msgDiv.className = 'message';
            }, 3000);
        }

        // Atualizar interface baseado no login
        function atualizarInterface(usuario) {
            const loginArea = document.getElementById('loginArea');
            const userArea = document.getElementById('userArea');
            
            if (usuario) {
                // Usuário logado
                loginArea.style.display = 'none';
                userArea.style.display = 'block';
                document.getElementById('userEmail').textContent = usuario.email;
                document.getElementById('userId').textContent = usuario.id;
                
                // Salvar no localStorage
                localStorage.setItem('usuario', JSON.stringify({
                    email: usuario.email,
                    id: usuario.id
                }));
            } else {
                // Usuário deslogado
                loginArea.style.display = 'block';
                userArea.style.display = 'none';
                localStorage.removeItem('usuario');
            }
        }

        // FUNÇÃO DE LOGIN
        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                mostrarMensagem('Preencha todos os campos!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Login realizado com sucesso!', 'success');
                atualizarInterface(data.user);
                
                // REDIRECIONAMENTO DIRETO - SEM TIMEOUT
                window.location.href = '/dashboard';
            }
        }

        // FUNÇÃO DE CADASTRO
        async function fazerCadastro() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                mostrarMensagem('Preencha todos os campos!', 'error');
                return;
            }
            
            if (password.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password
            });
            
            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Cadastro realizado! Verifique seu e-mail.', 'success');
            }
        }

        // FUNÇÃO DE LOGOUT
        async function fazerLogout() {
            await supabaseClient.auth.signOut();
            mostrarMensagem('Logout realizado!', 'success');
            atualizarInterface(null);
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // IR PARA DASHBOARD
        function irParaDashboard() {
            window.location.href = '/dashboard';
        }

        // VERIFICAR USUÁRIO AO CARREGAR
        async function verificarUsuario() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                atualizarInterface(user);
            } else {
                // Verificar se tem no localStorage
                const usuarioSalvo = localStorage.getItem('usuario');
                if (usuarioSalvo) {
                    console.log('Usuário encontrado no localStorage:', JSON.parse(usuarioSalvo));
                }
            }
        }

        // Iniciar
        verificarUsuario();
    </script>
</body>
</html>
