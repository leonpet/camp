<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Campeonato</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #2a2a38;
            --accent: #4f6ef7;
            --accent-glow: rgba(79,110,247,0.25);
            --text: #e8e8f0;
            --muted: #6b6b80;
            --error: #f74f4f;
            --success: #4ff79a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; top: -200px; left: 50%;
            transform: translateX(-50%); width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(79,110,247,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 420px;
            position: relative; z-index: 1;
            box-shadow: 0 0 0 1px rgba(79,110,247,0.1), 0 40px 80px rgba(0,0,0,0.4);
            animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(79,110,247,0.12); border: 1px solid rgba(79,110,247,0.25);
            color: var(--accent); font-size: 11px; font-weight: 600;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 12px; border-radius: 100px; margin-bottom: 28px;
        }
        .badge::before {
            content: ''; width: 6px; height: 6px;
            background: var(--accent); border-radius: 50%; box-shadow: 0 0 6px var(--accent);
        }
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; line-height: 1.5; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input::placeholder { color: var(--muted); }
        .btn {
            width: 100%; background: var(--accent); color: white; border: none;
            border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .btn:hover:not(:disabled) { background: #3d5ce8; box-shadow: 0 8px 24px var(--accent-glow); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-text { transition: opacity 0.2s; }
        .btn.loading .btn-text { opacity: 0; }
        .spinner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            opacity: 0; transition: opacity 0.2s;
        }
        .btn.loading .spinner { opacity: 1; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .msg {
            margin-top: 14px; padding: 10px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 500; display: none; align-items: center; gap: 8px;
        }
        .msg.error   { display: flex; background: rgba(247,79,79,0.1);  border: 1px solid rgba(247,79,79,0.25);  color: var(--error); }
        .msg.success { display: flex; background: rgba(79,247,154,0.1); border: 1px solid rgba(79,247,154,0.25); color: var(--success); }
        .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0 20px; }
        .register-link { text-align: center; font-size: 13px; color: var(--muted); }
        .register-link a { color: var(--accent); text-decoration: none; font-weight: 600; cursor: pointer; }
        #registerForm { display: none; }
        #registerForm.active { display: block; }
        #loginForm.hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">⚽ Campeonato</div>

    <div id="loginForm">
        <h1>Bem-vindo de volta</h1>
        <p class="subtitle">Entre com sua conta para acessar o painel.</p>
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Senha</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="btnLogin" onclick="fazerLogin()">
            <span class="btn-text">Entrar</span>
            <div class="spinner"></div>
        </button>
        <div class="msg" id="loginMsg"></div>
        <hr class="divider">
        <p class="register-link">Não tem conta? <a onclick="alternarForm('register')">Criar conta</a></p>
    </div>

    <div id="registerForm">
        <h1>Criar conta</h1>
        <p class="subtitle">Cadastre-se para acessar o sistema.</p>
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Senha</label>
            <input type="password" id="regPassword" placeholder="mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="field">
            <label>Confirmar senha</label>
            <input type="password" id="regPasswordConfirm" placeholder="••••••••">
        </div>
        <button class="btn" id="btnRegister" onclick="cadastrar()">
            <span class="btn-text">Criar conta</span>
            <div class="spinner"></div>
        </button>
        <div class="msg" id="registerMsg"></div>
        <hr class="divider">
        <p class="register-link">Já tem conta? <a onclick="alternarForm('login')">Fazer login</a></p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jumfigqlnqplbpokqhvj.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE'

    // SEM storageKey customizado — usa a chave padrão do Supabase
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // Se já logado, vai pro dashboard
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.replace('/dashboard')
    })

    function alternarForm(modo) {
        document.getElementById('loginForm').classList.toggle('hidden', modo === 'register')
        document.getElementById('registerForm').classList.toggle('active', modo === 'register')
    }

    function setLoading(btn, on) {
        btn.disabled = on
        btn.classList.toggle('loading', on)
    }

    function showMsg(id, texto, tipo) {
        const el = document.getElementById(id)
        el.textContent = texto
        el.className = 'msg ' + tipo
    }

    async function fazerLogin() {
        const email = document.getElementById('loginEmail').value.trim()
        const senha = document.getElementById('loginPassword').value
        const btn   = document.getElementById('btnLogin')

        if (!email || !senha) {
            showMsg('loginMsg', 'Preencha e-mail e senha.', 'error')
            return
        }

        setLoading(btn, true)
        document.getElementById('loginMsg').className = 'msg'

        const { data, error } = await sb.auth.signInWithPassword({ email, password: senha })

        if (error) {
            const msgs = {
                'Invalid login credentials': 'E-mail ou senha incorretos.',
                'Email not confirmed':        'Confirme seu e-mail antes de entrar.',
                'Too many requests':          'Muitas tentativas. Aguarde um momento.'
            }
            showMsg('loginMsg', msgs[error.message] || ('Erro: ' + error.message), 'error')
            setLoading(btn, false)
            return
        }

        // Sessão criada — redirecionar
        showMsg('loginMsg', '✓ Entrando...', 'success')
        setTimeout(() => window.location.replace('/dashboard'), 300)
    }

    async function cadastrar() {
        const email  = document.getElementById('regEmail').value.trim()
        const senha  = document.getElementById('regPassword').value
        const senha2 = document.getElementById('regPasswordConfirm').value
        const btn    = document.getElementById('btnRegister')

        if (!email || !senha) { showMsg('registerMsg', 'Preencha todos os campos.', 'error'); return }
        if (senha !== senha2)  { showMsg('registerMsg', 'As senhas não conferem.', 'error'); return }
        if (senha.length < 6)  { showMsg('registerMsg', 'Senha mínimo 6 caracteres.', 'error'); return }

        setLoading(btn, true)

        const { data, error } = await sb.auth.signUp({ email, password: senha })

        if (error) {
            showMsg('registerMsg', error.message, 'error')
            setLoading(btn, false)
            return
        }

        if (data.session) {
            showMsg('registerMsg', '✓ Conta criada! Entrando...', 'success')
            setTimeout(() => window.location.replace('/dashboard'), 400)
        } else {
            showMsg('registerMsg', 'Conta criada! Verifique seu e-mail para confirmar.', 'success')
            setLoading(btn, false)
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return
        if (!document.getElementById('registerForm').classList.contains('active')) fazerLogin()
        else cadastrar()
    })
</script>
</body>
</html>
