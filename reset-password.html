<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background-color: #45a049; }
        button.secondary {
            background-color: #888;
        }
        button.secondary:hover { background-color: #666; }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error   { background-color: #f8d7da; color: #721c24; }
        .info    { background-color: #d1ecf1; color: #0c5460; }
        #loading { color: #555; }
    </style>
</head>
<body>
    <h1>Redefinir Senha</h1>

    <div id="loading">
        <p>Verificando link... aguarde.</p>
    </div>

    <div id="formSection" style="display:none;">
        <p>Digite sua nova senha abaixo:</p>
        <input type="password" id="newPassword"     placeholder="Nova senha (mín. 6 caracteres)" minlength="6" />
        <input type="password" id="confirmPassword" placeholder="Confirmar nova senha"            minlength="6" />
        <button onclick="atualizarSenha()">Salvar nova senha</button>
        <button class="secondary" onclick="window.location.href='index.html'">Cancelar</button>
    </div>

    <div id="errorSection" style="display:none;">
        <p>Link inválido ou expirado.</p>
        <button onclick="window.location.href='index.html'">Voltar ao login</button>
    </div>

    <div id="message" class="message"></div>

    <script>
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = `message ${tipo}`;
        }

        async function inicializar() {
            // --- Tenta fluxo PKCE: ?code=... nos query params ---
            const queryParams = new URLSearchParams(window.location.search);
            const code = queryParams.get('code');

            if (code) {
                const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
                if (error) {
                    console.error('Erro PKCE:', error);
                    mostrarErro();
                } else {
                    mostrarForm();
                }
                return;
            }

            // --- Tenta fluxo legado (implicit): #access_token=... no hash ---
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken  = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const type         = hashParams.get('type');

            if (accessToken && type === 'recovery') {
                const { error } = await supabaseClient.auth.setSession({
                    access_token:  accessToken,
                    refresh_token: refreshToken
                });
                if (error) {
                    console.error('Erro implicit:', error);
                    mostrarErro();
                } else {
                    window.history.replaceState(null, '', window.location.pathname);
                    mostrarForm();
                }
                return;
            }

            // Nenhum token encontrado
            mostrarErro();
        }

        function mostrarForm() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
        }

        function mostrarErro() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorSection').style.display = 'block';
        }

        async function atualizarSenha() {
            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                mostrarMensagem('As senhas não conferem!', 'error');
                return;
            }
            if (newPassword.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('Senha atualizada com sucesso! Redirecionando...', 'success');
                await supabaseClient.auth.signOut();
                setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            }
        }

        inicializar();
    </script>
</body>
</html>
