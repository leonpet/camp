<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background-color: #45a049; }
        button.secondary { background-color: #888; }
        button.secondary:hover { background-color: #666; }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error   { background-color: #f8d7da; color: #721c24; }
        #loading { color: #555; font-size: 18px; margin-top: 40px; }
    </style>
</head>
<body>
    <h1>Redefinir Senha</h1>

    <div id="loading">
        <p>⏳ Verificando link, aguarde...</p>
    </div>

    <div id="formSection" style="display:none;">
        <p>Digite sua nova senha abaixo:</p>
        <input type="password" id="newPassword"     placeholder="Nova senha (mín. 6 caracteres)" minlength="6" />
        <input type="password" id="confirmPassword" placeholder="Confirmar nova senha"            minlength="6" />
        <button onclick="atualizarSenha()">Salvar nova senha</button>
        <button class="secondary" onclick="window.location.href='index.html'">Cancelar</button>
    </div>

    <div id="errorSection" style="display:none;">
        <p>❌ Link inválido ou expirado. Solicite um novo link de recuperação.</p>
        <button onclick="window.location.href='index.html'">Voltar ao login</button>
    </div>

    <div id="message" class="message"></div>

    <script>
        const supabaseUrl = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';

        // flowType: 'pkce' + detectSessionInUrl: true faz o Supabase
        // trocar o ?code= por uma sessão automaticamente ao carregar a página
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey, {
            auth: {
                detectSessionInUrl: true,
                flowType: 'pkce'
            }
        });

        function mostrarMensagem(texto, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = texto;
            msgDiv.className = `message ${tipo}`;
        }

        function mostrarForm() {
            document.getElementById('loading').style.display     = 'none';
            document.getElementById('formSection').style.display = 'block';
        }

        function mostrarErro() {
            document.getElementById('loading').style.display      = 'none';
            document.getElementById('errorSection').style.display = 'block';
        }

        async function atualizarSenha() {
            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                mostrarMensagem('As senhas não conferem!', 'error');
                return;
            }
            if (newPassword.length < 6) {
                mostrarMensagem('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                mostrarMensagem('Erro: ' + error.message, 'error');
            } else {
                mostrarMensagem('✅ Senha atualizada! Redirecionando...', 'success');
                await supabaseClient.auth.signOut();
                setTimeout(() => { window.location.href = 'index.html'; }, 2500);
            }
        }

        // O Supabase emite PASSWORD_RECOVERY quando detecta um link de recuperação válido.
        // Só mostramos o formulário DEPOIS que a sessão está estabelecida,
        // evitando o erro "Auth session missing!".
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event, session);

            if (event === 'PASSWORD_RECOVERY') {
                mostrarForm();
            } else if (event === 'SIGNED_IN' && window.location.search.includes('code=')) {
                // Fallback: alguns fluxos emitem SIGNED_IN em vez de PASSWORD_RECOVERY
                mostrarForm();
            }
        });

        // Timeout de segurança: se após 6s nenhum evento chegar, exibe erro
        setTimeout(() => {
            if (document.getElementById('loading').style.display !== 'none') {
                console.warn('Timeout: nenhum evento de recuperação recebido');
                mostrarErro();
            }
        }, 6000);
    </script>
</body>
</html>
