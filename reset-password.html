<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 12px 20px; margin: 10px 5px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #45a049; }
        button.secondary { background-color: #888; }
        button.secondary:hover { background-color: #666; }
        .message { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error   { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Redefinir Senha</h1>

    <div id="loading"><p>⏳ Verificando link, aguarde...</p></div>

    <div id="formSection" style="display:none;">
        <p>Digite sua nova senha abaixo:</p>
        <input type="password" id="newPassword"     placeholder="Nova senha (mín. 6 caracteres)" minlength="6" />
        <input type="password" id="confirmPassword" placeholder="Confirmar nova senha" minlength="6" />
        <button onclick="atualizarSenha()">Salvar nova senha</button>
        <button class="secondary" onclick="window.location.href='index.html'">Cancelar</button>
    </div>

    <div id="errorSection" style="display:none;">
        <p>❌ Link inválido ou expirado. Solicite um novo link.</p>
        <button onclick="window.location.href='index.html'">Voltar ao login</button>
    </div>

    <div id="message" class="message"></div>

    <script>
        const SUPABASE_URL = 'https://jumfigqlnqplbpokqhvj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1bWZpZ3FsbnFwbGJwb2txaHZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTMyOTE1NzIsImV4cCI6MjAyODg2NzU3Mn0.oa9VZXbP0CefDeswtrGknD03f5AfO3JJsfVUF3HXLlE';

        // Lê e guarda o access_token do hash ANTES de qualquer outra coisa
        const params       = new URLSearchParams(window.location.hash.replace(/^#/, ''));
        const ACCESS_TOKEN = params.get('access_token');
        const type         = params.get('type');

        function mostrarForm() {
            document.getElementById('loading').style.display     = 'none';
            document.getElementById('formSection').style.display = 'block';
        }
        function mostrarErro() {
            document.getElementById('loading').style.display      = 'none';
            document.getElementById('errorSection').style.display = 'block';
        }
        function mostrarMensagem(texto, tipo) {
            const el = document.getElementById('message');
            el.textContent = texto;
            el.className = 'message ' + tipo;
        }

        // Atualiza a senha chamando a API REST do Supabase diretamente
        // usando o access_token que já temos — sem depender de sessão no SDK
        async function atualizarSenha() {
            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) { mostrarMensagem('As senhas não conferem!', 'error'); return; }
            if (newPassword.length < 6)           { mostrarMensagem('Mínimo 6 caracteres!', 'error'); return; }

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type':  'application/json',
                        'apikey':        SUPABASE_KEY,
                        'Authorization': `Bearer ${ACCESS_TOKEN}`
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                const data = await response.json();

                if (!response.ok) {
                    mostrarMensagem('Erro: ' + (data.msg || data.message || 'Tente novamente.'), 'error');
                } else {
                    mostrarMensagem('✅ Senha atualizada! Redirecionando...', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 2500);
                }
            } catch (err) {
                mostrarMensagem('Erro de conexão: ' + err.message, 'error');
            }
        }

        // Inicializa: valida que o link tem access_token de recovery
        function inicializar() {
            if (!ACCESS_TOKEN || type !== 'recovery') {
                mostrarErro();
                return;
            }
            mostrarForm();
        }

        inicializar();
    </script>
</body>
</html>
